# =============================================
# REASONING — Logic and Deduction
# =============================================

[[test]]
id = "reason-logic"
persona = "code"
tier = "simple"
prompt = "Alice is taller than Bob. Charlie is shorter than Bob. Dana is taller than Alice. Order them from tallest to shortest. Reply with just the names in order, nothing else."

[[test]]
id = "reason-constraint"
persona = "code"
tier = "simple"
prompt = """Five houses in a row, each a different color (red, blue, green, yellow, white). The green house is immediately to the right of the white house. The red house is first. The blue house is not next to the yellow house. The yellow house is in position 4. What color is each house from left to right? Show your reasoning briefly then the answer."""

[[test]]
id = "reason-math-word"
persona = "code"
tier = "simple"
prompt = "A store sells apples for $1.50 each. If you buy 5 or more, you get 20% off the total. How much do 7 apples cost? Show work briefly then the final answer."

[[test]]
id = "reason-counterfactual"
persona = "code"
tier = "simple"
prompt = "If the Roman Empire had never fallen, would the Industrial Revolution have happened earlier, later, or not at all? Give exactly 3 arguments in numbered list form, each under 25 words."

[[test]]
id = "reason-knights"
persona = "code"
tier = "simple"
prompt = "On an island, knights always tell truth and knaves always lie. A says: 'B is a knave.' B says: 'A and C are the same type.' C says: 'I am a knight and B is a knave.' Determine what each person is. Show your reasoning. Are there multiple valid solutions?"

[[test]]
id = "reason-bayes"
persona = "math"
tier = "simple"
prompt = "Box A has 3 red, 2 blue balls. Box B has 1 red, 4 blue balls. You pick a box uniformly at random, then draw 2 balls WITHOUT replacement. Both are red. What is the probability you picked Box A? Use Bayes' theorem, show all steps."

[[test]]
id = "reason-detective"
persona = "code"
tier = "simple"
prompt = """Four suspects: Alice, Bob, Carol, Dave. Exactly one is guilty. Facts:
1. If Alice is guilty, Bob was at the scene.
2. If Bob was at the scene, Carol provided his alibi.
3. Carol did NOT provide an alibi for anyone.
4. Dave is guilty only if Alice is innocent.
5. At least one of Alice or Dave is guilty.
Who committed the crime? Prove by showing all other possibilities lead to contradictions."""

[[test]]
id = "reason-river"
persona = "code"
tier = "simple"
prompt = "A farmer must cross a river with a wolf, goat, and cabbage. The boat holds the farmer plus one item. Wolf eats goat if alone, goat eats cabbage if alone. What is the minimum number of crossings? List every crossing and the state of each bank after each step. Is there exactly one optimal solution or more than one?"

