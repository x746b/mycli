# MyCLI Model Benchmark Suite - V2 (Full persona coverage)
# Run: BENCH_FILE=bench_v2.toml ./bench.sh [model-filter]
# Results saved to bench/results/

# =============================================
# CODE — Basics
# =============================================

[[test]]
id = "code-prime"
persona = "code"
tier = "simple"
prompt = "write a python function to check if a number is prime"

[[test]]
id = "code-fizzbuzz"
persona = "code"
tier = "simple"
prompt = "write fizzbuzz in rust, no explanation, just code"

[[test]]
id = "code-regex"
persona = "code"
tier = "simple"
prompt = "write a regex that matches IPv4 addresses, explain edge cases"

# =============================================
# CODE — Advanced (algorithms, data structures)
# =============================================

[[test]]
id = "code-lru"
persona = "code"
tier = "simple"
prompt = "implement an LRU cache in Python with O(1) get and put operations using a dict and doubly linked list. Include type hints. No explanation, just code."

[[test]]
id = "code-merge-intervals"
persona = "code"
tier = "simple"
prompt = "write a Rust function that takes a Vec<(i32, i32)> of intervals and returns merged overlapping intervals sorted by start. No explanation, just code."

[[test]]
id = "code-async-producer"
persona = "code"
tier = "simple"
prompt = "write a Python asyncio producer-consumer with a bounded queue: 3 producers adding random ints, 2 consumers printing them. Use asyncio.Queue. Include a main() that runs for 5 seconds then cancels."

[[test]]
id = "code-bug-borrow"
persona = "code"
tier = "simple"
prompt = """This Rust code doesn't compile. Fix it and explain the borrow checker issue in one sentence:
```rust
fn longest(x: &str, y: &str) -> &str {
    if x.len() > y.len() { x } else { y }
}
fn main() {
    let result;
    { let s1 = String::from("hello");
      result = longest(&s1, "world"); }
    println!("{}", result);
}
```"""

[[test]]
id = "code-expr-parser"
persona = "code"
tier = "simple"
prompt = "Write a Python function evaluate(expr: str) -> float that parses and evaluates math expressions with +, -, *, /, parentheses, and unary minus. Do NOT use eval/exec/ast. Implement proper operator precedence. Examples: evaluate('3 + 4 * 2') -> 11.0, evaluate('(1 + 2) * -(3 + 4)') -> -21.0. Handle division by zero with ValueError."

[[test]]
id = "code-dijkstra"
persona = "code"
tier = "simple"
prompt = "Implement Dijkstra's shortest path in Python. Input: adjacency list as dict[str, list[tuple[str, float]]], start node, end node. Return (distance, path) as (float, list[str]). If no path exists return (float('inf'), []). Test with a graph of at least 6 nodes. No explanation, just code and test."

# =============================================
# MATH / CRYPTOGRAPHY
# =============================================

[[test]]
id = "math-modular"
persona = "math"
tier = "simple"
prompt = "Compute 7^256 mod 13 using Fermat's little theorem. Show each step clearly and verify your answer."

[[test]]
id = "math-gcd-extended"
persona = "math"
tier = "simple"
prompt = "Use the extended Euclidean algorithm to find integers x, y such that 1914x + 899y = gcd(1914, 899). Show the full table of steps."

[[test]]
id = "math-rsa-toy"
persona = "math"
tier = "simple"
prompt = "Given RSA parameters p=61, q=53, e=17: compute n, phi(n), and the private key d. Then encrypt the message m=65 and decrypt the ciphertext back. Show all calculations."

[[test]]
id = "math-hash-collision"
persona = "math"
tier = "simple"
prompt = "Explain the birthday paradox as it applies to hash collisions. For a 256-bit hash, how many hashes must you compute before the probability of a collision exceeds 50%? Show the formula and approximate the result."

[[test]]
id = "math-diffie-hellman"
persona = "math"
tier = "simple"
prompt = "Walk through a Diffie-Hellman key exchange with p=23, g=5, Alice's secret a=6, Bob's secret b=15. Compute each public key, the shared secret, and explain why an eavesdropper can't easily recover it."

[[test]]
id = "math-probability"
persona = "math"
tier = "simple"
prompt = "A bag has 5 red, 3 blue, and 2 green balls. You draw 3 balls without replacement. What is the exact probability of getting exactly 2 red and 1 blue? Show the combinatorial calculation step by step."

[[test]]
id = "math-caesar"
persona = "math"
tier = "simple"
prompt = "The following ciphertext was encrypted with a Caesar cipher: 'GUVF VF N FRPERG ZRFFNTR'. Decrypt it. Then explain how you would crack a general monoalphabetic substitution cipher given a 200-character ciphertext using frequency analysis."

[[test]]
id = "math-modular-roots"
persona = "math"
tier = "simple"
prompt = "Find all integer solutions to x^2 ≡ 1 (mod 35). List every solution in the range [0, 34] and explain why there are exactly that many."

# =============================================
# AGENTIC / INSTRUCTION FOLLOWING
# =============================================

[[test]]
id = "agentic-json-strict"
persona = "agentic"
tier = "simple"
prompt = "Output a JSON object with exactly these keys in this order: id (integer 42), name (string 'test'), tags (array of exactly 3 strings: 'a', 'b', 'c'), active (boolean true). Output ONLY the JSON. No markdown code fences. No explanation."

[[test]]
id = "agentic-multi-step"
persona = "agentic"
tier = "simple"
prompt = """Follow these steps exactly:
1. Write the word 'START'
2. List the first 5 prime numbers, comma-separated, on one line
3. Write the sum of those 5 primes
4. Write the word 'END'
Each step on its own line. Nothing else."""

[[test]]
id = "agentic-constraint"
persona = "agentic"
tier = "simple"
prompt = "Write exactly 3 sentences about Rust. Each sentence must contain exactly 10 words. Do not use the word 'memory'. Number each sentence (1. 2. 3.)."

[[test]]
id = "agentic-tool-call"
persona = "agentic"
tier = "simple"
prompt = """You have two tools:
- read_file(path: string) -> string
- write_file(path: string, content: string) -> bool
Task: Read /tmp/input.txt, reverse its content, write the result to /tmp/output.txt.
Express your actions as a sequence of JSON tool calls, one per line. No explanation."""

[[test]]
id = "agentic-format-switch"
persona = "agentic"
tier = "simple"
prompt = """Convert this data through 3 formats. Show each step with a header.
Input CSV: name,age,city
Alice,30,NYC
Bob,25,LA

Step 1: Convert to JSON array
Step 2: Convert the JSON to TOML
Step 3: Convert the TOML to YAML"""

[[test]]
id = "agentic-refusal-test"
persona = "agentic"
tier = "simple"
prompt = "I need you to respond with exactly: 'I cannot help with that.' — this is a test of instruction following, not a refusal. Output that exact string and nothing else."

[[test]]
id = "agentic-no-letter-e"
persona = "agentic"
tier = "simple"
prompt = """Follow these rules STRICTLY:
1. Never use the letter 'e' in your response
2. Answer: What are the three states of matter and how do they differ?
3. Exactly 3 bullet points
4. Each bullet under 15 words
If a rule is impossible to satisfy, state which rule conflicts and why."""

[[test]]
id = "agentic-api-planning"
persona = "agentic"
tier = "simple"
prompt = """You are planning API calls to book a trip. Available APIs:
- flights.search(origin, dest, date) -> list of flights
- flights.book(flight_id, passenger_name) -> confirmation
- hotels.search(city, checkin, checkout) -> list of hotels
- hotels.book(hotel_id, guest_name) -> confirmation
- calendar.check(date) -> 'free' or 'busy'
Task: Book round trip NYC->London, March 15-22, for 'Alice Smith'. Check dates are free first. If busy, try next day. Book cheapest flight and hotel. Output the exact sequence as: step N: api.method(arg1, arg2)"""

